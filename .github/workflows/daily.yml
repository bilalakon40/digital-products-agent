name: تشغيل الوكيل يومياً

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  create-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node src/index.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_TOKEN }}
